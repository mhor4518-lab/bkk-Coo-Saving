<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ข้อมูลพนักงาน TTSBKK</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    /* CSS เดิมของคุณ + ตกแต่ง Profile Card */
    * { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
    .card { padding: 25px; width: 100%; border-top: 12px solid #004a99; min-height: 100vh; background: white; }
    h2 { color: #004a99; text-align: center; font-size: 26px; }
    
    /* สไตล์สำหรับบัตรพนักงาน */
    .profile-box { 
      background: #f0f7ff; border-radius: 15px; padding: 20px; 
      border: 1px solid #d0e3ff; margin-top: 20px; display: none; 
    }
    .info-group { margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
    .info-label { font-size: 14px; color: #666; }
    .info-value { font-size: 20px; color: #004a99; font-weight: 600; }
    
    /* สไตล์ฟอร์มเดิม */
    form { display: none; flex-direction: column; }
    label { font-weight: 600; font-size: 18px; margin-bottom: 8px; }
    input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 2px solid #bbb; font-size: 18px; }
    button { background: #004a99; color: white; border: none; padding: 20px; border-radius: 15px; font-size: 22px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="mainTitle">ระบบพนักงาน</h2>
    
    <div id="profileCard" class="profile-box">
      <div style="text-align:center; margin-bottom:15px;">
         <div style="background:#004a99; color:white; display:inline-block; padding:5px 15px; border-radius:20px; font-size:14px;">สมาชิกพนักงานทั่วไป</div>
      </div>
      <div class="info-group">
        <div class="info-label">ชื่อ-นามสกุล</div>
        <div id="dispName" class="info-value">-</div>
      </div>
      <div class="info-group">
        <div class="info-label">รหัสพนักงาน</div>
        <div id="dispId" class="info-value">-</div>
      </div>
      <div class="info-group">
        <div class="info-label">แผนก</div>
        <div id="dispDept" class="info-value">-</div>
      </div>
      <div class="info-group">
        <div class="info-label">วันที่ลงทะเบียน</div>
        <div id="dispDate" class="info-value">-</div>
      </div>
      <button onclick="liff.closeWindow()" style="background:#666; margin-top:20px;">ปิดหน้าต่าง</button>
    </div>

    <form id="regForm">
      <h2>สมัครสมาชิก</h2>
      <input type="hidden" id="lineId">
      <label>รหัสพนักงาน</label>
      <input type="text" id="employeeId" required>
      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" required>
      <button type="submit" id="btn">ยืนยันลงทะเบียน</button>
    </form>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNENvyhKyUebYrsogXqQKmDy4ZuG2CK-rFA8MvLfYWNMAqgPrrLEkb4M4avPTKTHjO/exec";
    const LIFF_ID = "2009900127-e74QaPVv";

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      
      const profile = await liff.getProfile();
      const lineId = profile.userId;
      document.getElementById('lineId').value = lineId;

      // 🔍 เช็คข้อมูลก่อนว่าเคยสมัครหรือยัง
      checkExistingUser(lineId);
    }

    function checkExistingUser(lineId) {
      // ใช้ fetch เพื่อดึงข้อมูลโปรไฟล์
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getProfile", lineId: lineId })
      })
      .then(res => res.json())
      .then(res => {
        if (res.found) {
          // ✅ ถ้าเจอข้อมูล ให้โชว์ Profile Card
          document.getElementById('mainTitle').innerText = "ข้อมูลสมาชิกพนักงาน";
          document.getElementById('dispName').innerText = res.name;
          document.getElementById('dispId').innerText = res.empId;
          document.getElementById('dispDept').innerText = res.dept;
          document.getElementById('dispDate').innerText = res.date;
          document.getElementById('profileCard').style.display = "block";
        } else {
          // ❌ ถ้าไม่เจอ ให้โชว์ฟอร์มสมัคร
          document.getElementById('regForm').style.display = "flex";
        }
      });
    }

    initLiff();

    // ส่วนของ onSubmit เดิมของคุณ...
  </script>
</body>
</html>
