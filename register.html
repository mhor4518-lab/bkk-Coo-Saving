<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>BKK Smart Factory</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
    .card { padding: 25px; width: 100%; border-top: 12px solid #004a99; min-height: 100vh; background: white; display: flex; flex-direction: column; }
    h2 { color: #004a99; text-align: center; font-size: 28px; margin-bottom: 20px; }
    .status-line { text-align: center; font-size: 16px; padding: 12px; background: #eef6ff; border-radius: 10px; margin-bottom: 25px; color: #004a99; font-weight: bold; }
    
    label { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; display: block; }
    input, select, textarea { width: 100%; padding: 16px; margin-bottom: 20px; border: 2px solid #bbb; border-radius: 12px; font-size: 18px; font-family: 'Kanit'; -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus { border-color: #004a99; outline: none; background: #f0f7ff; }
    
    button { background: #004a99; color: white; border: none; font-weight: 600; padding: 18px; border-radius: 15px; font-size: 22px; cursor: pointer; width: 100%; margin-top: 10px; }
    button:active { background: #003366; transform: scale(0.98); }
    button:disabled { background: #ccc; }

    .profile-box { background: #f9fcff; border-radius: 15px; padding: 20px; border: 1px solid #d0e3ff; margin-bottom: 25px; }
    .info-group { margin-bottom: 12px; border-bottom: 1px dashed #ccc; padding-bottom: 8px; }
    .info-label { font-size: 14px; color: #666; }
    .info-value { font-size: 20px; color: #004a99; font-weight: 600; }

    .news-section { margin-bottom: 30px; }
    .news-title { font-size: 20px; font-weight: 600; color: #004a99; margin-bottom: 15px; border-left: 5px solid #004a99; padding-left: 10px; }
    .news-item { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; text-decoration: none; color: #333; }
    .news-date { font-size: 12px; color: #fff; background: #004a99; padding: 4px 8px; border-radius: 5px; margin-right: 15px; }
    .news-text { font-size: 16px; flex-grow: 1; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="mainTitle">BKK Smart Factory</h2>
    <div id="status" class="status-line">กำลังโหลดข้อมูล...</div>

    <input type="hidden" id="lineId">

    <form id="regForm" style="display:none; flex-direction: column;">
      <label>รหัสพนักงาน</label>
      <input type="text" id="employeeId" placeholder="กรอกรหัสพนักงาน" required>
      
      <label>หน่วยงาน</label>
      <select id="dept" required>
        <option value="" disabled selected>-- เลือกหน่วยงาน --</option>
        <option value="BKK">BKK</option>
        <option value="AYU">AYU</option>
        <option value="TPPT">TPPT</option>
        <option value="HO">HO</option>
      </select>

      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="08x-xxxxxxx" required>
      <button type="submit" id="btnReg">ยืนยันลงทะเบียน</button>
    </form>

    <div id="pendingView" style="display:none; text-align:center;">
      <div style="font-size: 60px; margin: 20px 0;">⏳</div>
      <h3 style="color:#004a99;">รอการอนุมัติจาก Admin</h3>
      <p>ระบบได้รับข้อมูลของคุณแล้ว<br>กรุณารอการตรวจสอบสักครู่ครับ</p>
      <button onclick="liff.closeWindow()" style="background:#666;">ปิดหน้าต่าง</button>
    </div>

    <div id="approvedView" style="display:none; flex-direction: column;">
      <div class="profile-box">
        <div style="text-align:center; margin-bottom:10px;"><span style="background:#28a745; color:white; padding:4px 12px; border-radius:20px; font-size:12px;">พนักงาน TTSBKK</span></div>
        <div class="info-group"><div class="info-label">ชื่อ-นามสกุล</div><div id="dispName" class="info-value">-</div></div>
        <div class="info-group" style="display:flex; justify-content:space-between;">
          <div style="width:48%;"><div class="info-label">รหัส</div><div id="dispId" class="info-value">-</div></div>
          <div style="width:48%;"><div class="info-label">หน่วยงาน</div><div id="dispDept" class="info-value">-</div></div>
        </div>
      </div>

      <div class="news-section">
        <div class="news-title">ประกาศล่าสุด</div>
        <div id="newsList"></div>
      </div>

      <div class="feedback-section" style="background:#f9f9f9; padding:15px; border-radius:15px; border:1px solid #eee;">
        <div class="news-title" style="font-size:18px;">ส่งข้อเสนอแนะ</div>
        <form id="feedbackForm">
          <select id="fbTopic" required><option value="" disabled selected>เลือกหัวข้อ</option><option value="บริการ">บริการ</option><option value="สวัสดิการ">สวัสดิการ</option><option value="ระบบ">ระบบออนไลน์</option></select>
          <textarea id="fbDetails" rows="3" placeholder="รายละเอียด..." required></textarea>
          <button type="submit" id="btnFb" style="font-size:18px; padding:12px;">ส่งข้อมูล</button>
        </form>
      </div>
      <button onclick="liff.closeWindow()" style="background:#666; margin-top:30px;">ปิดหน้าต่าง</button>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_FKIFpC-njsghrHkX8h1OHCmAq-eFCI5f16w4XVqWv8GS0PUs64m9QT8wcr-d8ARG/exec"; 
    const LIFF_ID = "2009900127-e74QaPVv";

    function hideAll() {
      document.getElementById('status').style.display = 'none';
      document.getElementById('regForm').style.display = 'none';
      document.getElementById('pendingView').style.display = 'none';
      document.getElementById('approvedView').style.display = 'none';
    }

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const lineId = liff.getDecodedIDToken().sub;
      document.getElementById('lineId').value = lineId;
      
      fetch(SCRIPT_URL + "?action=getProfile&lineId=" + lineId + "&t=" + new Date().getTime())
      .then(res => res.json())
      .then(res => {
        hideAll();
        if (res.found) {
          if (res.status === "Pending") {
            document.getElementById('pendingView').style.display = 'block';
          } else {
            document.getElementById('dispName').innerText = res.name;
            document.getElementById('dispId').innerText = res.empId;
            document.getElementById('dispDept').innerText = res.dept;
            let newsHTML = "";
            res.news.forEach(n => { newsHTML += `<a href="${n.link}" target="_blank" class="news-item"><span class="news-date">${n.date}</span><span class="news-text">${n.title}</span></a>`; });
            document.getElementById('newsList').innerHTML = newsHTML || "ไม่มีประกาศ";
            document.getElementById('approvedView').style.display = 'flex';
          }
        } else {
          document.getElementById('regForm').style.display = 'flex';
        }
      });
    }

    document.getElementById('regForm').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('btnReg').disabled = true;
      const data = { action: "register", lineId: document.getElementById('lineId').value, employeeId: document.getElementById('employeeId').value, dept: document.getElementById('dept').value, phone: document.getElementById('phone').value };
      fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) }).then(() => { alert("ลงทะเบียนแล้ว รอการอนุมัติครับ"); liff.closeWindow(); });
    };

    document.getElementById('feedbackForm').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('btnFb').disabled = true;
      const data = { action: "feedback", lineId: document.getElementById('lineId').value, topic: document.getElementById('fbTopic').value, details: document.getElementById('fbDetails').value };
      fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) }).then(() => { alert("ส่งสำเร็จ"); document.getElementById('feedbackForm').reset(); document.getElementById('btnFb').disabled = false; });
    };

    initLiff();
  </script>
</body>
</html>
