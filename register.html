<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>BKK Smart Factory</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
    .card { padding: 25px; width: 100%; border-top: 12px solid #004a99; min-height: 100vh; background: white; display: flex; flex-direction: column; }
    h2 { color: #004a99; text-align: center; font-size: 26px; margin-bottom: 20px; }
    .status-line { text-align: center; font-size: 16px; padding: 12px; background: #eef6ff; border-radius: 10px; margin-bottom: 25px; color: #004a99; font-weight: bold; }
    
    label { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 8px; display: block; }
    input, select, textarea { width: 100%; padding: 16px; margin-bottom: 20px; border: 2px solid #bbb; border-radius: 12px; font-size: 18px; font-family: 'Kanit'; -webkit-appearance: none; }
    input:focus, select:focus, textarea:focus { border-color: #004a99; outline: none; background: #f0f7ff; }
    button { background: #004a99; color: white; border: none; font-weight: 600; padding: 18px; border-radius: 15px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,74,153,0.2); width: 100%; margin-top: 10px; }
    button:active { background: #003366; transform: scale(0.98); }
    button:disabled { background: #ccc; }

    .profile-box { background: #f9fcff; border-radius: 15px; padding: 20px; border: 1px solid #d0e3ff; margin-bottom: 25px; }
    .info-group { margin-bottom: 12px; border-bottom: 1px dashed #ccc; padding-bottom: 8px; }
    .info-label { font-size: 14px; color: #666; }
    .info-value { font-size: 20px; color: #004a99; font-weight: 600; }

    .news-section { margin-bottom: 30px; }
    .news-title { font-size: 20px; font-weight: 600; color: #004a99; margin-bottom: 15px; border-left: 5px solid #004a99; padding-left: 10px; }
    .news-item { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; text-decoration: none; color: #333; }
    .news-date { font-size: 12px; color: #fff; background: #004a99; padding: 4px 8px; border-radius: 5px; margin-right: 15px; white-space: nowrap; }
    .news-text { font-size: 16px; font-weight: 400; flex-grow: 1; }
    
    .feedback-section { background: #fff; border: 1px solid #ddd; padding: 20px; border-radius: 15px; }
    hr { border: 0; border-top: 2px solid #eee; margin: 25px 0; }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="mainTitle">BKK Smart Factory</h2>
    <div id="status" class="status-line">กำลังดึงข้อมูล...</div>
    <input type="hidden" id="lineId">

    <form id="regForm" style="display:none; flex-direction: column;">
      <h3 style="text-align:center; color:#555; margin-top:0;">ลงทะเบียนเข้าใช้งาน</h3>
      <label>รหัสพนักงาน</label>
      <input type="text" id="employeeId" required>
      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" required>
      <button type="submit" id="btnReg">ยืนยันลงทะเบียน</button>
    </form>

    <div id="pendingView" style="display:none; text-align:center; padding:30px 10px;">
      <div style="font-size: 60px; margin-bottom: 20px;">⏳</div>
      <h3 style="color:#004a99;">อยู่ระหว่างรออนุมัติ</h3>
      <p style="color:#555; font-size: 18px;">ข้อมูลถูกส่งเข้าระบบแล้ว<br>รอ Admin ตรวจสอบสักครู่ครับ</p>
      <button onclick="liff.closeWindow()" style="background:#666; margin-top:20px;">ปิดหน้าต่าง</button>
    </div>

    <div id="approvedView" style="display:none; flex-direction: column;">
      <div class="profile-box">
        <div style="text-align:center; margin-bottom:15px;">
           <span style="background:#28a745; color:white; padding:5px 15px; border-radius:20px; font-size:14px;">✅ ยืนยันตัวตนแล้ว</span>
        </div>
        <div class="info-group">
          <div class="info-label">ชื่อ-นามสกุล</div>
          <div id="dispName" class="info-value">-</div>
        </div>
        <div class="info-group" style="display:flex; justify-content:space-between;">
          <div style="width:48%;">
            <div class="info-label">รหัสพนักงาน</div>
            <div id="dispId" class="info-value">-</div>
          </div>
          <div style="width:48%;">
            <div class="info-label">แผนก</div>
            <div id="dispDept" class="info-value">-</div>
          </div>
        </div>
      </div>

      <div class="news-section">
        <div class="news-title">ประกาศ / ข่าวสาร</div>
        <div id="newsList"></div>
      </div>

      <div class="feedback-section">
        <div class="news-title">กล่องข้อเสนอแนะ</div>
        <form id="feedbackForm" style="display: flex; flex-direction: column;">
          <label>หัวข้อ</label>
          <select id="fbTopic" required>
            <option value="" disabled selected>-- เลือกหัวข้อ --</option>
            <option value="บริการ">บริการของเจ้าหน้าที่</option>
            <option value="สวัสดิการ">สวัสดิการและการกู้ยืม</option>
            <option value="ระบบ">ระบบออนไลน์/แอปพลิเคชัน</option>
            <option value="อื่นๆ">อื่นๆ</option>
          </select>
          <label>รายละเอียด</label>
          <textarea id="fbDetails" rows="4" required></textarea>
          <button type="submit" id="btnFb">ส่งข้อเสนอแนะ</button>
        </form>
      </div>
      <button onclick="liff.closeWindow()" style="background:#666; margin-top:30px;">ปิดหน้าต่างแอป</button>
    </div>
  </div>

  <script>
    // 🚨 1. วาง URL จาก Google Apps Script (อันใหม่ล่าสุด)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRGNYOVTS4A6fXAZLMK8edQzkJWUO1y3WLHjXTvP_Xpl4lmYwC5e0-b79WXCRUgywz/exec"; 
    
    // 🚨 2. วาง LIFF ID ของคุณ
    const LIFF_ID = "2009900127-e74QaPVv";

    // ฟังก์ชันซ่อนทุกหน้าจอให้สะอาดก่อน
    function hideAllViews() {
      document.getElementById('status').style.display = "none";
      document.getElementById('regForm').style.display = "none";
      document.getElementById('pendingView').style.display = "none";
      document.getElementById('approvedView').style.display = "none";
    }

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const lineId = liff.getDecodedIDToken().sub;
          document.getElementById('lineId').value = lineId;
          checkUserData(lineId);
        } else {
          liff.login();
        }
      } catch (err) {
        document.getElementById('status').innerText = "เชื่อมต่อผิดพลาด";
      }
    }

    function checkUserData(lineId) {
      // เพิ่ม &t=... ป้องกันการติด Cache
      const url = SCRIPT_URL + "?action=getProfile&lineId=" + lineId + "&t=" + new Date().getTime();
      
      fetch(url)
      .then(res => res.json())
      .then(res => {
        hideAllViews(); // 🧹 เคลียร์หน้าจอก่อนโชว์ของจริง
        
        if (res.found) {
          if (res.status === "Pending") {
            document.getElementById('mainTitle').innerText = "ระบบสมาชิก";
            document.getElementById('pendingView').style.display = "block";
          } else {
            document.getElementById('mainTitle').innerText = "ข้อมูลพนักงาน";
            document.getElementById('dispName').innerText = res.name;
            document.getElementById('dispId').innerText = res.empId;
            document.getElementById('dispDept').innerText = res.dept;
            
            let newsHTML = "";
            if (res.news && res.news.length > 0) {
              res.news.forEach(item => {
                newsHTML += `<a href="${item.link}" target="_blank" class="news-item"><span class="news-date">${item.date}</span><span class="news-text">${item.title}</span><span style="color:#aaa;">❯</span></a>`;
              });
            } else {
              newsHTML = "<p style='text-align:center; color:#999;'>ยังไม่มีประกาศใหม่</p>";
            }
            document.getElementById('newsList').innerHTML = newsHTML;
            
            document.getElementById('approvedView').style.display = "flex";
          }
        } else {
          document.getElementById('mainTitle').innerText = "ลงทะเบียน";
          document.getElementById('regForm').style.display = "flex";
        }
      })
      .catch(err => {
        hideAllViews();
        document.getElementById('mainTitle').innerText = "เชื่อมต่อผิดพลาด";
      });
    }

    // สมัครสมาชิก
    document.getElementById('regForm').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('btnReg').disabled = true;
      const data = {
        action: "register",
        lineId: document.getElementById('lineId').value,
        employeeId: document.getElementById('employeeId').value,
        phone: document.getElementById('phone').value
      };
      fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
      .then(() => { alert("ส่งคำขอแล้ว!"); liff.closeWindow(); })
      .catch(() => { document.getElementById('btnReg').disabled = false; });
    };

    // ส่ง Feedback
    document.getElementById('feedbackForm').onsubmit = function(e) {
      e.preventDefault();
      document.getElementById('btnFb').disabled = true;
      const data = {
        action: "feedback",
        lineId: document.getElementById('lineId').value,
        topic: document.getElementById('fbTopic').value,
        details: document.getElementById('fbDetails').value
      };
      fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) })
      .then(() => { alert("ส่งข้อมูลเรียบร้อย!"); document.getElementById('feedbackForm').reset(); document.getElementById('btnFb').disabled = false; })
      .catch(() => { document.getElementById('btnFb').disabled = false; });
    };

    initLiff();
  </script>
</body>
</html>
