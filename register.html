<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ลงทะเบียน TTSBKK</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Kanit', sans-serif; background-color: #ffffff; margin: 0; padding: 0; min-height: 100vh; }
    .card { padding: 20px; width: 100%; border-top: 12px solid #004a99; display: flex; flex-direction: column; min-height: 100vh; }
    h2 { color: #004a99; text-align: center; font-size: 26px; margin: 10px 0 20px 0; }
    .status-line { text-align: center; font-size: 16px; font-weight: bold; padding: 12px; background: #eef6ff; border-radius: 10px; margin-bottom: 20px; }
    
    /* แก้ไขให้ Input เรียงตัวสวยงามไม่ซ้อนกัน */
    form { display: flex; flex-direction: column; flex-grow: 1; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 18px; }
    input, select { 
      width: 100%; padding: 15px; margin-bottom: 20px; 
      border: 2px solid #bbb; border-radius: 12px; font-size: 18px; 
      font-family: 'Kanit'; -webkit-appearance: none;
    }
    input:focus { border-color: #004a99; outline: none; background: #f9fcff; }
    
    button { 
      background: #004a99; color: white; border: none; font-weight: 600; 
      padding: 18px; border-radius: 15px; font-size: 22px; cursor: pointer;
      margin-top: auto; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button:disabled { background: #ccc; }
  </style>
</head>
<body>
  <div class="card">
    <h2>สมัครสมาชิกพนักงาน</h2>
    <div id="status" class="status-line">กำลังเชื่อมต่อ LINE...</div>
    
    <form id="regForm" style="display:none;">
      <input type="hidden" id="lineId">
      
      <label>รหัสพนักงาน</label>
      <input type="text" id="employeeId" placeholder="กรอกรหัสพนักงาน 5 หลัก" required>
      
      <p style="font-size: 14px; color: #666; margin-top: -15px; margin-bottom: 15px;">* ระบบจะดึงชื่อ-แผนกอัตโนมัติจากฐานข้อมูลบริษัท</p>
      
      <label>เบอร์โทรศัพท์</label>
      <input type="tel" id="phone" placeholder="08x-xxxxxxx" required>
      
      <button type="submit" id="btn">ยืนยันลงทะเบียน</button>
    </form>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOWXX5ObW8kjI-iM5mbyF3Aj2An_igJxLnWnxAR5gUVwGHi-BdUcW89EFHLv42ajaY/exec";
    const LIFF_ID = "2009900127-e74QaPVv";

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          document.getElementById('lineId').value = profile.userId;
          document.getElementById('status').innerText = "เชื่อมต่อ LINE สำเร็จ ✅";
          document.getElementById('status').style.color = "#28a745";
          document.getElementById('regForm').style.display = "flex";
        } else {
          liff.login();
        }
      } catch (err) {
        document.getElementById('status').innerText = "เชื่อมต่อผิดพลาด: " + err;
      }
    }
    initLiff();

    document.getElementById('regForm').onsubmit = function(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.innerText = "กำลังตรวจสอบฐานข้อมูล...";
      
      const data = {
        action: "register",
        lineId: document.getElementById('lineId').value,
        employeeId: document.getElementById('employeeId').value,
        phone: document.getElementById('phone').value
      };

      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(data)
      })
      .then(() => {
        alert("ส่งข้อมูลลงทะเบียนแล้ว! \nระบบกำลังตรวจสอบรหัสพนักงานใน Master Data \nหากถูกต้องชื่อของคุณจะปรากฏในระบบทันที");
        liff.closeWindow();
      })
      .catch(err => {
        alert("Error: " + err);
        btn.disabled = false;
      });
    };
  </script>
</body>
</html>
